version: 2

 
models:
  - name: sl_fact_bookings
    description: "Facts Model will link all dim models"
    config:
      access: public
      group: data_engineer | data_analysts  # The model now belongs to this group

    # The semantic model lives right here inside the model entry
    semantic_model:
      enabled: true
    agg_time_dimension: time_snapshot  # date column should be inportant to calculate timeseries
   
    columns:
    #Entities
      - name : booking_id
        entity:
          name: bookingid
          type: primary

      - name : lisitng_id
        entity:
          name: listingid
          type: foreign

      - name : host_id
        entity:
          name: hostid
          type: foreign

      - name: time_snapshot  
        granularity: day
        dimension:
          type: time

    metrics:
#Simple Metrics
      - name: count_of_superhost_facts
        type: simple
        agg: count_distinct
        expr: host_id
        filter: |
         {{ Dimension('hostid__is_superhost') }} ='TRUE'
        config:
          enabled: true

      - name: sum_of_booking_amt
        type: simple
        agg: sum
        expr: total_booking_amount
        config:
          enabled: true

      - name: count_of_booking_id_against_host
        type: simple
        agg: count_distinct
        expr: booking_id
        fill_nulls_with: 0
        config:
          enabled: true

