version: 2

models:
  - name: silver_bookings
    description: "Consolidated model property file"
    config:
      materialized: table
      schema: silver

    # The semantic model lives right here inside the model entry
    semantic_model:
      enabled: true
    agg_time_dimension: booking_date
    columns:
    #Entities
      - name : booking_id
        entity: 
          name: bookingid
          type: primary
      - name: booking_lisitng_id
        entity: 
          name: bookinglisitngid
          type: foreign
    #Time Dimensions
      - name: booking_date
        granularity: day
        dimension:
          type: time
      
      - name: booking_created_at
        granularity: day
        dimension:
          type: time
      
    #Categorical 
      - name: booking_status
        dimension:
          type: categorical

    metrics:
#Simple Metrics
      - name: sum_of_booking_amount
        type: simple
        agg: sum
        expr: booking_amount

      - name: count_of_bookings
        type: simple
        agg: count
        expr: booking_amount

# advanced metrics under top-level metrics key
metrics:
  - name: booking_ratio
    type: ratio
    numerator: sum_of_booking_amount
    denominator: count_of_bookings

#Derived metric current day - yesterday to track running sales
  - name: lag_booking_amt
    description: Difference between bookings now and 1 day ago
    type: derived
    label: d1 booking change
    expr: current_day_booking_amt - one_day_ago_booking_amt
    input_metrics:
      - name: booking_amount
        alias: current_day_booking_amt
      - name: booking_amount
        offset_window: 1 days
        alias: one_day_ago_booking_amt

      