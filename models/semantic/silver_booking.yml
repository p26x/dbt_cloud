version: 2

models:
  - name: silver_bookings
    description: "Consolidated model property file"
    config:
      materialized: table
      schema: silver

    # The semantic model lives right here inside the model entry
    semantic_model:
      enabled: true
    agg_time_dimension: booking_date
    
    columns:
    #Entities
      - name : booking_id
        entity: 
          name: bookingid
          type: primary
      - name: booking_lisitng_id
        entity: 
          name: listingid       # this name must be same when joining 2 models 
          type: foreign
    #Time Dimensions
      - name: booking_date
        granularity: day
        dimension:
          type: time
      
      - name: booking_created_at
        granularity: day
        dimension:
          type: time
      
    #Categorical 
      - name: booking_status
        dimension:
          type: categorical

    metrics:
#Simple Metrics
      - name: sum_of_booking_amount
        type: simple
        agg: sum
        expr: booking_amount

      - name: count_of_bookings
        type: simple
        agg: count
        expr: booking_amount

      - name: booking_rate
        type: ratio
        agg: sum
        numerator: sum_of_booking_amount
        denominator: count_of_bookings

      - name: revenue_p95
        type: simple
        agg: percentile
        expr: booking_amount
        percentile: 0.95            # 0.95 percent, it will give the booking amount from 1 to 95, Bookings 96, 97, 98, 99, and 100: These people paid more than $3,192. The very last person (the 100th) might have paid $10,000!
        percentile_type: discrete   # discrite: will give round off value
      
      # to get top 5 sum of discrite we need to write saved query booking > revenue_p95
     
      # For this we need to write saved query to tell group by
      - name: d7_booking_change
        type: derived
        expr: current_bookings - bookings_7_days_ago
        input_metrics:
          - name: sum_of_booking_amount
            alias: current_bookings
          - name: sum_of_booking_amount
            offset_window: 7 days
            alias: bookings_7_days_ago
      # to get running sum EG: feb 1= 100, feb 2 = 150(50+100), feb 3 =250 (100+150)
      - name: revenue_mtd_cumulative
        type: cumulative
        input_metric: sum_of_booking_amount
        #window: 30 days
        grain_to_date: month
        #period_agg: last

      - name: yearly_booking_amount
        type: cumulative
        input_metric: sum_of_booking_amount
        grain_to_date: year

      - name: quater_booking_amount
        type: cumulative
        input_metric: sum_of_booking_amount
        grain_to_date: quarter

      - name: day_booking_amount
        type: cumulative
        input_metric: sum_of_booking_amount
        grain_to_date: day

  - name: silver_listings
    description: "Consolidated model property file"
    config:
      materialized: table
      schema: silver

    # The semantic model lives right here inside the model entry
    semantic_model:
      enabled: true
    agg_time_dimension: listing_created_at
    
    columns:
    #Entities
      - name : listing_id
        entity: 
          name: listingid           # this name must be same when joining 2 models
          type: primary
      - name: listing_host_id
        entity: 
          name: listinghostid
          type: foreign
    #Time Dimensions
      - name: listing_created_at
        granularity: day
        dimension:
          type: time
      
    #Categorical 
      - name: property_type
        dimension:
          type: categorical

      - name: room_type
        dimension:
          type: categorical

      - name: city
        dimension:
          type: categorical

      - name: country
        dimension:
          type: categorical

      - name: price_rateing
        dimension:
          type: categorical

    metrics:
#Simple Metrics
      - name: count_of_listings
        type: simple
        agg: count
        expr: listing_id

####### below is taking metric from 2 models and creating a metrics

metrics:
  - name: avg_booking_amt_per_listing
    description: average booking aount per lisitng
    type: derived
    label: avg booking amt per listing
    expr: sum_of_total_booking_amt / total_listings
    input_metrics:
      - name: sum_of_booking_amount
        alias: sum_of_total_booking_amt
      - name: count_of_listings
        alias: total_listings




# advanced metrics under top-level metrics key
#metrics:
#Derived metric current day - yesterday to track running sales
  - name: lag_booking_amt
    description: Difference between bookings now and 1 day ago
    type: derived
    label: d1 booking change
    expr: current_day_booking_amt - one_day_ago_booking_amt
    input_metrics:
      - name: sum_of_booking_amount
        alias: current_day_booking_amt
      - name: sum_of_booking_amount
        offset_window: 1 days
        alias: one_day_ago_booking_amt


#  grain_to_date: month
#1. Monthly Grain-to-Date (MTD)
# Logic: It sums data from the 1st day of the current month up to the current day.
#Behavior: On the 2nd of the month, it only shows 2 days of data. On the 30th, it shows 30 days.


# Window: 30 days
#2. Window of 1 Month (Rolling 30 Days)
#Logic: It sums data from today back to the same date last month (e.g., Feb 24 back to Jan 24).
#Behavior: The size of the "bucket" stays roughly the same every day. It never "resets" to zero.
      

#Setting,Logic,Real-World Use Case
#sum,Adds every daily value together,Total Revenue (MTD)
#average,Means the daily values,Avg Daily Bookings
#last,Takes the most recent value,Current Inventory
#min / max,Takes the lowest/highest value,Peak Daily Sales

