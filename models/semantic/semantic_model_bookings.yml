semantic_models:
  - name: booking
    model: ref('silver_bookings')
    description: "Booking fact table at the transaction level. Contains booking dates, amounts, fees, and status."

    defaults:
      agg_time_dimension: booking_date

    entities:
      - name: booking
        type: primary
        expr: booking_id
      - name: listing
        type: foreign
        expr: booking_lisitng_id

    dimensions:
      - name: booking_date
        type: time
        type_params:
          time_granularity: day
        config:
          meta:
            metricflow:
              primary_time: true

      - name: booking_created_at
        type: time
        type_params:
          time_granularity: day

      - name: booking_status
        type: categorical
        expr: booking_status

    measures:
      - name: booking_amount
        description: "Booking amount without fees."
        agg: sum
        expr: booking_amount


metrics:
  - name: sum_of_booking_amt
    type: simple
    label: sum of booking amount
    type_params:
      measure:
        name: booking_amount


saved_queries:
  - name: total_sum_of_bookings
    description: Total booking amount
    query_params:
      metrics:
        - sum_of_booking_amt
    exports:
      - name: total_sum_of_booking_metrics
        config:
          export_as: table




