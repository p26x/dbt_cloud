semantic_models:
  - name: booking
    model: ref('silver_bookings')
    description: "Booking fact table at the transaction level. Contains booking dates, amounts, fees, and status."

    defaults:
      agg_time_dimension: booking_date

    entities:
      - name: booking_id
        type: primary
        expr: booking_id
      - name: listing
        type: foreign
        expr: booking_lisitng_id

    dimensions:
      - name: booking_date
        type: time
        expr: booking_date
        type_params:
          time_granularity: day

      - name: booking_status
        type: categorical
        expr: booking_status

    measures:
      - name: booking_amount
        description: "Booking amount without fees."
        agg: sum
        expr: booking_amount

      - name: booking_amount_avg
        description: "Booking amount avg"
        agg: average
        expr: booking_amount
    
metrics:
  - name: daily_booking_amount
    type: simple
    label: sum of booking amount
    measure: booking_amount
    time_granularity: day

  - name: monthly_booking_amount
    type: simple
    label: sum of booking amount
    measure: booking_amount
    time_granularity: month

  - name: quaterly_booking_amount
    type: simple
    label: sum of booking amount
    measure: booking_amount
    time_granularity: quarter

  - name: yearly_booking_amount
    type: simple
    label: sum of booking amount
    measure: booking_amount
    time_granularity: year







