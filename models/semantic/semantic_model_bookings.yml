
semantic_models:
  - name: booking
    model: ref('silver_bookings')
    description: "Booking fact table at the transaction level. Contains booking dates, amounts, fees, and status."

    defaults:
      agg_time_dimension: booking_date

    entities:
      - name: booking_id
        type: primary
        expr: booking_id

      - name: listing
        type: foreign
        # IMPORTANT: fix the column name to your actual column in silver_bookings
        expr: booking_listing_id

    dimensions:
      - name: booking_date
        type: time
        expr: booking_date
        type_params:
          time_granularity: day
        config:
          meta:
            metricflow:
              primary_time: true

      - name: booking_created_at
        type: time
        expr: booking_created_at
        type_params:
          time_granularity: day

      - name: booking_status
        type: categorical
        expr: booking_status

      # DEBUG: This helps you confirm the date column is coming through to Power BI
      # If this appears but booking_date doesn't, it's a time-dimension typing/casting issue.
      - name: booking_date_cat
        type: categorical
        expr: booking_date

    measures:
      - name: booking_amount
        description: "Booking amount without fees."
        agg: sum
        expr: booking_amount

      - name: booking_amount_avg
        description: "Booking amount avg"
        agg: average
        expr: booking_amount


metrics:
  - name: sum_of_booking_amt
    type: simple
    label: sum of booking amount
    type_params:
      measure:
        name: booking_amount

  - name: avg_of_booking_amt
    type: simple
    label: avg of booking amount
    type_params:
      measure:
        name: booking_amount_avg


saved_queries:
  - name: bookings_sv_metrics
    description: "Booking metrics grouped by booking date + status"
    config:
      cache:
        enabled: true

    query_params:
      metrics:
        - sum_of_booking_amt
        - avg_of_booking_amt

      group_by:
        # Use semantic model scope for time dimensions (most common working path)
        - TimeDimension('booking_id__booking_date', 'day')

        # Keep business slice
        - Dimension('booking_id__booking_status')

        # Optional: include the booking_id key as a column (remove if grain becomes too big)
        - Entity('booking_id')

        # DEBUG: categorical date (should definitely show up in Power BI)
        - Dimension('booking__booking_date_cat')

        # Optional: listing entity (only keep if you need it)
        - Entity('listing')

    exports:
      - name: total_sum_of_booking_metrics
        config:
          export_as: table
          schema: metrics
