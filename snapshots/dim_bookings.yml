snapshots:
  - name: dim_bookings
    relation: ref('gold_bookings')
    config: 
      target_database: dev
      target_schema: gold
      unique_key: booking_id  # if booking id is not presnt record will insert else update
      strategy: timestamp
      updated_at: booking_date
      snapshot_meta_column_names:
        dbt_valid_from: start_date
        dbt_valid_to: end_date
        dbt_updated_at: snapshot_timestamp
        dbt_scd_id: row_hash_id
      hard_deletes: invalidate
      dbt_valid_to_current: "to_date('9999-12-31')"